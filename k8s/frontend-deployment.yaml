apiVersion: apps/v1
kind: Deployment
metadata:
  name: supergiros-frontend
  namespace: supergiros # <-- Aquí especificamos el nuevo nombre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supergiros-frontend
  template:
    metadata:
      labels:
        app: supergiros-frontend
    spec:
      containers:
      - name: frontend
        image: supergiros-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: supergiros-frontend-svc
  namespace: supergiros # <-- Aquí especificamos el nuevo nombre
spec:
  type: NodePort
  selector:
    app: supergiros-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080 # Tu frontend estará en este puerto