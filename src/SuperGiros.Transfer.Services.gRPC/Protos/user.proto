syntax = "proto3";
option csharp_namespace = "SuperGiros.Transfer.Services.gRPC.Protos";
package user;

service UserServices {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UpdateUserResponse);
  rpc ChangeUserState (ChangeUserStateRequest) returns (ChangeUserStateResponse);
  rpc GetUsers (GetUsersRequest) returns (GetUsersResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string token = 2;
  string message = 3;
  string role = 4;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  string role = 3;
}

message CreateUserResponse {
  int32 id = 1;
  string message = 2;
}

message UpdateUserRequest {
  int32 id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}

message UpdateUserResponse {
  bool success = 1;
  string message = 2;
}

message ChangeUserStateRequest {
  int32 id = 1;
  int32 new_state = 2;
}

message ChangeUserStateResponse {
  bool success = 1;
  string message = 2;
}

message GetUsersRequest {}

message GetUsersResponse {
  message UserInfo {
    int32 id = 1;
    string username = 2;
    string role = 3;
    int32 state = 4;
  }
  repeated UserInfo users = 1;
}